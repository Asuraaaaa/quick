seed: 42
output_dir: outputs/exp_baseline

data:
  train_csv: data/train.csv
  val_csv: data/val.csv
  test_csv: data/test.csv
  num_classes: 5
  sample_rate: 1000
  n_fft: 382
  win_length: 382
  hop_length: 26
  stft_center: true
  stft_normalized: false
  stft_pad_mode: reflect
  input_mode: two_channel   # [two_channel, split_dual, concat]
  batch_size: 32
  num_workers: 4
  pin_memory: true

model:
  fusion:
    enabled: true
    d_model: 192
    nhead: 8
    dim_feedforward: 384
    dropout: 0.1
    batch_first: true
  backbone:
    name: transformer        # [transformer, cnn]
    dropout: 0.1
    transformer:
      num_layers: 2
      d_model: 192
      nhead: 8
      dim_feedforward: 384
      batch_first: true
    cnn:
      base_channels: 32
  classifier:
    hidden_dims: [256, 128]
    dropout: 0.2

loss:
  lambda_in: 0.4
  lambda_out: 0.4
  alpha_in: 0.2
  alpha_out: 0.2

optimizer:
  name: adamw
  lr: 0.0003
  weight_decay: 0.0001

scheduler:
  name: cosine
  t_max: 50
  eta_min: 1e-6

train:
  epochs: 50
  amp: true
  grad_clip: 1.0
  log_interval: 20
  save_best_metric: val_f1

transfer:
  enabled: false
  pretrained_path: ""
  strict: false
  freeze_backbone: false
